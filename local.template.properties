# Скопируйте этот файл в local.properties и заполните значения.

# Путь к Android SDK (обычно ~/Android/Sdk на Linux/Mac, C:\Users\...\AppData\Local\Android\Sdk на Windows)
sdk.dir=/home/user/Android/Sdk

# Путь к keystore файлу для подписи APK
# Если нет — создайте: keytool -genkey -v -keystore keystore.jks -alias key -keyalg RSA -keysize 2048 -validity 10000
keystore.path=keystore.jks
keystore.alias=key
keystore.password=changeme
keystore.keyPassword=changeme
